<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
     <title>IceCream Shop</title>
     <link rel="stylesheet" href="css/site.css" />
</head>

<body>
     <div class="container">
        <h1>IceCream Shop</h1>

        <div class="form-row">
            <input type="text" id="add-name" placeholder="New iceCream">
            <button class="button" onclick="addItem()">Add</button>
        </div>

        <p id="counter"></p>

        <div class="grid" id="iceCreamGrid"></div>

        <div id="editForm" style="display:none; margin-top:12px;">
            <h3>Edit</h3>
            <form action="javascript:void(0);" onsubmit="updateItem()">
                <input type="hidden" id="edit-id">
                <label>
                    <input type="checkbox" id="edit-isGlutenFree"> Is Gluten Free
                </label>
                <input type="text" id="edit-name" placeholder="Ice cream name">
                <input type="submit" value="Save" class="button">
                <a onclick="closeInput()" aria-label="Close">&#10006;</a>
            </form>
        </div>

        <a href="user.html">למעבר לרשימת המשתמשים</a>
    </div>
     <script src="js/site.js" asp-append-version="true"></script>
    <script type="text/javascript">
        getItems();
  </script>
</body>
</html>
